<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menú del Restaurante</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #e9f48f;
      margin: 0;
      padding: 0;
      color: black;
    }

    header {
      background-color: #e9f48f;
      padding: 20px;
      text-align: center;
      color: white;
      position: relative;
    }

    h1 {
      margin: 0;
      font-size: 2.5em;
    }

    .menu {
      max-width: 800px;
      margin: 20px auto;
      padding: 20px;
      background-color: #e9f48f;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    .menu h2 {
      border-bottom: 2px solid black;
      padding-bottom: 5px;
      margin-bottom: 10px;
      color: black;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    .item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 5px;
    }

    .name, .price, .description {
      font-weight: bold;
    }

    .price {
      color: black;
    }

    .description {
      font-style: italic;
      color: black;
      margin-bottom: 15px;
    }

  </style>
</head>
<body>
<header>
  <img src="img/logoMadrid.png" alt="Logo Mandarin">
</header>

<section class="menu">
  <h2>Paquetes</h2>
  <ul id="entradas"></ul>

  <h2>Inidividuales</h2>
  <ul id="platos-principales"></ul>

</section>
<a href="menuEdit.html"><but>hola tonotos</but></a>

<script>
  // Cargar el menú guardado en localStorage
  window.onload = function() {
    const storedData = localStorage.getItem('menuData');
    if (storedData) {
      const menuData = JSON.parse(storedData);

      Object.keys(menuData).forEach(sectionId => {
        const section = document.getElementById(sectionId);
        section.innerHTML = ''; // Limpiar la sección

        // Añadir solo los platillos que estén activos
        menuData[sectionId].forEach(itemData => {
          if (itemData.active) {  // Verificar si el platillo está activo
            const newItem = `
              <li>
                <div class="item">
                  <span class="name">${itemData.name}</span>
                  <span class="price">${itemData.price}</span>
                </div>
                <p class="description">${itemData.description}</p>
              </li>`;
            section.insertAdjacentHTML('beforeend', newItem);
          }
        });
      });
    }
  };
</script>
</body>
</html>
