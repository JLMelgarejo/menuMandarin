<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menú de Restaurante</title>
  <style>
    @media (max-width: 600px) {
      .image-grid {
        grid-template-columns: 1fr;
      }
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f7f7f7;
      margin: 0;
      padding: 0;
      color: #333;
    }

    p{
      color: #925a23;
      font-size: 50px;
    }

    header {
      background-color: #d4a373;
      padding: 20px;
      text-align: center;
      color: white;
    }

    h1 {
      margin: 0;
      font-size: 2.5em;
    }

    .menu {
      max-width: 800px;
      margin: 20px auto;
      padding: 20px;
      background-color: #fff;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    .menu h2 {
      border-bottom: 2px solid #d4a373;
      padding-bottom: 5px;
      margin-bottom: 10px;
      color: #d4a373;
    }

    ul {
      list-style: none;
      padding: 0;
    }


    .image-item {
      text-align: center;
    }

    .image-item img {
      width: 100%;
      height: 200px; /* Establece una altura fija */
      object-fit: cover; /* Recorta la imagen si no ocupa todo el espacio */
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    .image-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px; /* Espacio entre las columnas */
      margin-top: 20px;
    }

    .image-grid2 {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-top: 20px;
    }



    .image-item p {
      margin-top: 10px;
      color: #666;
    }
  </style>
</head>
<body>
<header>
  <h1>Restaurante Madrid</h1>
</header>

<section class="menu">

  <h2>Bienvenido, es un placer tenerlo de vuelta</h2>
  <div class="image-grid">
    <div class="image-item">
      <a href="menuViewSectionOne.html"><img src="img/desayuno.png" alt="desayuno"></a>
      <p>Paquetes</p>
    </div>
    <div class="image-item">
      <a href="menuViewSectionTwo.html"><img src="img/desayuno.png" alt="desayuno"></a>
      <p>Individual</p>
    </div>
  </div>
  <div class="image-grid2">
    <div class="image-item">
      <img id="chef-suggestion" src="img/almuerzo.png" alt="sugerencia">
      <p>Pruebe la sugerencia de nuestro chef</p>
    </div>
  </div>

  <a href="galery.html">Cambiar imagen de la sugerencia del chef</a>

</section>
<a href="menuCover2.html">gallery edit</a>
<script>
  // Restaurar los datos guardados en localStorage
  window.onload = function() {
    const storedData = localStorage.getItem('menuData');
    if (storedData) {
      const menuData = JSON.parse(storedData);
      let items = document.querySelectorAll('.name, .price, .description');
      items.forEach((item, index) => {
        item.innerText = menuData[index].content;
      });
    }
  };
  // Restaurar la imagen de la sugerencia del chef desde el localStorage
  window.onload = function() {
    const chefSuggestionImage = localStorage.getItem('chefSuggestionImage');
    if (chefSuggestionImage) {
      document.getElementById('chef-suggestion').src = chefSuggestionImage;
    }
  };
</script>
</body>
</html>
