<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar Menú de Restaurante</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f7f7f7;
      margin: 0;
      padding: 0;
      color: #333;
    }

    header {
      background-color: #925a23;
      padding: 20px;
      text-align: center;
      color: white;
    }

    h1 {
      margin: 0;
      font-size: 2.5em;
    }

    .menu {
      max-width: 800px;
      margin: 20px auto;
      padding: 20px;
      background-color: #fff;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    .menu h2 {
      border-bottom: 2px solid #d4a373;
      padding-bottom: 5px;
      margin-bottom: 10px;
      color: #d4a373;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    .item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 5px;
    }

    .name, .price, .description {
      font-weight: bold;
    }

    .price {
      color: #d4a373;
    }

    .description {
      font-style: italic;
      color: #666;
      margin-bottom: 15px;
    }

    /* Botones */
    #saveButton, .addButton, .deleteButton, .toggleButton {
      padding: 10px;
      background-color: #d4a373;
      color: white;
      text-align: center;
      border: none;
      cursor: pointer;
      font-size: 1.2em;
      margin-top: 20px;
    }

    #saveButton:hover, .addButton:hover, .deleteButton:hover, .toggleButton:hover {
      background-color: #b28260;
    }

    .deleteButton {
      background-color: #ff4c4c;
      margin-left: 10px;
    }

    .deleteButton:hover {
      background-color: #e64444;
    }

    .addButton {
      display: block;
      width: 100%;
    }

    .toggleButton {
      background-color: #4caf50;
      margin-left: 10px;
    }

    .toggleButton.inactive {
      background-color: #f39c12;
    }

    .toggleButton.inactive:hover {
      background-color: #e67e22;
    }
  </style>
</head>
<body>
<header>
  <h1>Restaurante Madrid</h1>
</header>

<section class="menu">
  <h2>Paquetes</h2>
  <ul id="entradas"></ul>
  <button class="addButton" onclick="addItem('entradas')">Agregar Platillo</button>

  <h2>Individuales</h2>
  <ul id="platos-principales"></ul>
  <button class="addButton" onclick="addItem('platos-principales')">Agregar Platillo</button>

  <button id="saveButton">Guardar Cambios</button>
</section>

<script>
  // Función para guardar los cambios en localStorage
  document.getElementById('saveButton').addEventListener('click', function() {
    let menuSections = ['entradas', 'platos-principales'];
    let menuData = {};

    menuSections.forEach(sectionId => {
      let sectionItems = [];
      let items = document.querySelectorAll(`#${sectionId} li`);

      items.forEach(item => {
        let name = item.querySelector('.name').innerText;
        let price = item.querySelector('.price').innerText;
        let description = item.querySelector('.description').innerText;
        let active = !item.querySelector('.toggleButton').classList.contains('inactive');

        sectionItems.push({ name, price, description, active });
      });

      menuData[sectionId] = sectionItems;
    });

    // Guardar los datos del menú en localStorage
    localStorage.setItem('menuData', JSON.stringify(menuData));
    window.location.href = 'menuView.html';
  });

  // Restaurar los datos editados si existen en localStorage
  window.onload = function() {
    const storedData = localStorage.getItem('menuData');
    if (storedData) {
      const menuData = JSON.parse(storedData);

      Object.keys(menuData).forEach(sectionId => {
        const section = document.getElementById(sectionId);
        section.innerHTML = ''; // Limpiar la sección

        menuData[sectionId].forEach(itemData => {
          const newItem = `
            <li>
              <div class="item">
                <span class="name" contenteditable="true">${itemData.name}</span>
                <span class="price" contenteditable="true">${itemData.price}</span>
                <button class="toggleButton ${itemData.active ? '' : 'inactive'}">
                  ${itemData.active ? 'Activo' : 'Inactivo'}
                </button>
                <button class="deleteButton">Eliminar</button>
              </div>
              <p class="description" contenteditable="true">${itemData.description}</p>
            </li>`;
          section.insertAdjacentHTML('beforeend', newItem);
        });

        // Asignar eventos a los botones de activación y eliminación
        assignEventListeners(sectionId);
      });
    }
  };

  // Función para añadir un nuevo platillo
  function addItem(sectionId) {
    const section = document.getElementById(sectionId);
    const newItem = `
      <li>
        <div class="item">
          <span class="name" contenteditable="true">Nuevo Platillo</span>
          <span class="price" contenteditable="true">$0.00</span>
          <button class="toggleButton">Activo</button>
          <button class="deleteButton">Eliminar</button>
        </div>
        <p class="description" contenteditable="true">Descripción del platillo.</p>
      </li>`;
    section.insertAdjacentHTML('beforeend', newItem);

    // Asignar eventos de eliminación y activación al nuevo platillo
    assignEventListeners(sectionId);
  }

  // Función para asignar eventos a los botones de activación y eliminación
  function assignEventListeners(sectionId) {
    const section = document.getElementById(sectionId);

    // Asignar el evento de activación/desactivación
    section.querySelectorAll('.toggleButton').forEach(button => {
      button.addEventListener('click', function() {
        this.classList.toggle('inactive');
        this.textContent = this.classList.contains('inactive') ? 'Inactivo' : 'Activo';
      });
    });

    // Asignar el evento de eliminación
    section.querySelectorAll('.deleteButton').forEach(button => {
      button.addEventListener('click', function() {
        this.parentElement.parentElement.remove();
      });
    });
  }
</script>
</body>
</html>
