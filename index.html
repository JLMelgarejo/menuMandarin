<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menú del Restaurante</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f7f7f7;
      margin: 0;
      padding: 0;
      color: #333;
    }

    header {
      background-color: #925a23;
      padding: 20px;
      text-align: center;
      color: white;
    }

    h1 {
      margin: 0;
      font-size: 2.5em;
    }

    .menu {
      max-width: 800px;
      margin: 20px auto;
      padding: 20px;
      background-color: #fff;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    .menu h2 {
      border-bottom: 2px solid #d4a373;
      padding-bottom: 5px;
      margin-bottom: 10px;
      color: #d4a373;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    .item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 5px;
    }

    .name {
      font-weight: bold;
    }

    .price {
      color: #d4a373;
      font-weight: bold;
    }

    .description {
      font-style: italic;
      color: #666;
      margin-bottom: 15px;
    }
  </style>
</head>
<body>
<header>
  <h1>Restaurante Madrid - Menú</h1>
</header>

<section class="menu" id="menuDisplay">
  <!-- El menú será mostrado aquí -->
</section>
<a href="viewport.html">aline</a>

<script>
  // Función para cargar y mostrar el menú guardado en localStorage
  window.onload = function() {
    const storedData = localStorage.getItem('menuData');
    if (storedData) {
      const menuData = JSON.parse(storedData);
      const menuDisplay = document.getElementById('menuDisplay');

      // Borrar contenido previo
      menuDisplay.innerHTML = '';

      // Mostrar cada sección del menú
      Object.keys(menuData).forEach(sectionId => {
        let sectionTitle = '';
        switch(sectionId) {
          case 'entradas':
            sectionTitle = 'Entradas';
            break;
          case 'platos-principales':
            sectionTitle = 'Platos Principales';
            break;
          case 'postres':
            sectionTitle = 'Postres';
            break;
        }

        // Crear un título de sección
        const sectionElement = document.createElement('h2');
        sectionElement.textContent = sectionTitle;
        menuDisplay.appendChild(sectionElement);

        // Crear la lista de platillos de la sección
        const ul = document.createElement('ul');
        menuData[sectionId].forEach(itemData => {
          const li = document.createElement('li');
          li.innerHTML = `
            <div class="item">
              <span class="name">${itemData.name}</span>
              <span class="price">${itemData.price}</span>
            </div>
            <p class="description">${itemData.description}</p>`;
          ul.appendChild(li);
        });
        menuDisplay.appendChild(ul);
      });
    } else {
      document.getElementById('menuDisplay').innerHTML = '<p>El menú está vacío. Por favor, agregue elementos en la página de edición.</p>';
    }
  };
</script>
</body>
</html>
